<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kazuri — Career Coach (Prototype)</title>
<style>
  :root {
    --green-deep: #046A38;
    --green: #00A651;
    --green-bright: #3DDC84;
    --cream: #F7F8F5;
    --ink: #10231A;
    --ink-soft: #4A5C52;
    --border: #DCE5DF;
    --amber: #C77D00;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Segoe UI', -apple-system, sans-serif;
    background: var(--cream);
    color: var(--ink);
  }
  .wrap {
    max-width: 640px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: #fff;
    box-shadow: 0 0 40px rgba(0,0,0,0.05);
  }
  header {
    background: linear-gradient(135deg, var(--green-deep), var(--green));
    color: #fff;
    padding: 22px 24px 18px;
    position: relative;
    overflow: hidden;
  }
  header::after {
    content: "";
    position: absolute;
    right: -40px; top: -40px;
    width: 160px; height: 160px;
    background: rgba(255,255,255,0.08);
    border-radius: 50%;
  }
  .brand-row { display: flex; align-items: center; gap: 12px; position: relative; z-index: 1; }
  .avatar {
    width: 42px; height: 42px; border-radius: 12px;
    background: rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 18px;
    border: 1px solid rgba(255,255,255,0.3);
  }
  header h1 { margin: 0; font-size: 19px; font-weight: 700; letter-spacing: 0.2px; }
  header p { margin: 2px 0 0; font-size: 12.5px; opacity: 0.85; }
  .proto-tag {
    display: inline-flex; align-items: center; gap: 5px;
    margin-top: 10px; font-size: 11px; font-weight: 600;
    background: rgba(255,255,255,0.14);
    border: 1px solid rgba(255,255,255,0.25);
    padding: 4px 10px; border-radius: 20px;
    position: relative; z-index: 1;
  }
  .proto-tag .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green-bright); }

  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    background:
      radial-gradient(circle at 10% 0%, rgba(0,166,81,0.04), transparent 40%);
    transition: outline 0.15s ease, background 0.15s ease;
  }
  .msg { display: flex; flex-direction: column; max-width: 84%; animation: rise 0.25s ease; }
  @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .msg.bot { align-self: flex-start; }
  .msg.user { align-self: flex-end; }
  .bubble {
    padding: 12px 14px;
    border-radius: 14px;
    font-size: 14.5px;
    line-height: 1.5;
  }
  .msg.bot .bubble {
    background: #EFF6F1;
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--ink);
    font-size: 15px;
    line-height: 1.6;
  }
  .msg.bot .bubble p { margin: 0 0 10px; }
  .msg.bot .bubble p:last-child { margin-bottom: 0; }
  .msg.bot .bubble ul { margin: 2px 0 12px 0; padding: 0; list-style: none; }
  .msg.bot .bubble ul:last-child { margin-bottom: 0; }
  .msg.bot .bubble li {
    position: relative;
    padding-left: 16px;
    margin-bottom: 6px;
  }
  .msg.bot .bubble li::before {
    content: "";
    position: absolute;
    left: 2px; top: 8px;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--green);
  }
  .msg.bot .bubble h4 {
    margin: 12px 0 6px;
    font-size: 12.5px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--green-deep);
  }
  .msg.bot .bubble h4:first-child { margin-top: 0; }
  .msg.bot .bubble strong { color: var(--green-deep); font-weight: 700; }
  .msg.user .bubble {
    background: var(--green);
    color: #fff;
    border-top-right-radius: 4px;
    font-size: 15px;
    line-height: 1.5;
  }
  .grounded-tag {
    display: inline-flex; align-items: center; gap: 4px;
    margin-top: 5px; font-size: 10.5px; font-weight: 600;
    color: var(--green-deep);
    opacity: 0.75;
  }
  .grounded-tag.uncertain { color: var(--amber); }

  .quick-row {
    display: flex; gap: 8px; flex-wrap: wrap;
    padding: 0 20px 14px;
    max-height: 60px;
    opacity: 1;
    overflow: hidden;
    transition: opacity 0.2s ease, max-height 0.2s ease, padding 0.2s ease;
  }
  .quick-row.hidden { opacity: 0; max-height: 0; padding: 0 20px; pointer-events: none; }
  .quick-btn {
    font-size: 12.5px; padding: 7px 12px;
    border-radius: 18px; border: 1px solid var(--border);
    background: #fff; color: var(--green-deep);
    cursor: pointer; font-weight: 600;
    transition: 0.15s;
  }
  .quick-btn:hover { background: #EFF6F1; border-color: var(--green); }

  .input-row {
    display: flex; gap: 10px;
    padding: 14px 20px 20px;
    border-top: 1px solid var(--border);
    background: #fff;
  }
  .input-row input {
    flex: 1;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1px solid var(--border);
    font-size: 14.5px;
    outline: none;
  }
  .input-row input:focus { border-color: var(--green); }
  .input-row button {
    background: var(--green);
    color: #fff; border: none;
    padding: 0 20px;
    border-radius: 12px;
    font-weight: 700;
    cursor: pointer;
    font-size: 14px;
  }
  .input-row button:disabled { opacity: 0.5; cursor: default; }
  #attachBtn {
    background: #fff;
    color: var(--green-deep);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 44px;
    font-size: 17px;
    padding: 0;
    cursor: pointer;
    position: relative;
  }
  #attachBtn:hover { background: #EFF6F1; border-color: var(--green); }
  #attachBtn:disabled { opacity: 0.5; cursor: default; }
  #attachBtn.uploading .attach-icon { visibility: hidden; }
  #attachBtn .spinner {
    display: none;
    position: absolute; top: 50%; left: 50%;
    width: 16px; height: 16px;
    margin: -8px 0 0 -8px;
    border: 2px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  #attachBtn.uploading .spinner { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .file-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.15); border: 1px solid transparent;
    padding: 6px 10px; border-radius: 10px;
    font-size: 12.5px; color: #fff;
  }

  .dropzone-active {
    outline: 2px dashed var(--green);
    outline-offset: -8px;
    background: rgba(0,166,81,0.06);
  }

  .typing { display: flex; gap: 4px; padding: 4px 0; }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green);
    animation: bounce 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-4px); opacity: 1; } }

  footer.credit {
    text-align: center; font-size: 10.5px; color: var(--ink-soft);
    padding: 8px 0 14px; background: #fff;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .reset-link { color: var(--green-deep); font-weight: 600; cursor: pointer; text-decoration: underline; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand-row">
      <div class="avatar">K</div>
      <div>
        <h1>Kazuri Career Coach</h1>
        <p>Safaricom Internship Assistant</p>
      </div>
    </div>
    <div class="proto-tag"><span class="dot"></span> Prototype — grounded-answer concept by Mitchell Muyu</div>
  </header>

  <div class="chat-area" id="chatArea"></div>

  <div class="quick-row" id="quickRow">
    <button class="quick-btn" data-q="How do I apply for a Safaricom internship?">How do I apply?</button>
    <button class="quick-btn" data-q="What is the internship stipend?">What's the stipend?</button>
    <button class="quick-btn" data-q="What happens after I apply?">What happens after I apply?</button>
  </div>

  <div class="input-row">
    <button id="attachBtn" title="Upload your CV for feedback" type="button">
      <span class="attach-icon">📎</span>
      <span class="spinner"></span>
    </button>
    <input type="file" id="fileInput" accept=".pdf,.docx,.txt" style="display:none" />
    <input type="text" id="userInput" placeholder="Ask about the internship..." maxlength="500" />
    <button id="sendBtn">Send</button>
  </div>
  <footer class="credit">
    <span>Portfolio prototype · not an official Safaricom product</span>
    <span class="reset-link" id="resetLink">New conversation</span>
  </footer>
</div>

<script>
  const chatArea = document.getElementById('chatArea');
  const userInput = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const quickRow = document.getElementById('quickRow');
  const attachBtn = document.getElementById('attachBtn');
  const fileInput = document.getElementById('fileInput');
  const resetLink = document.getElementById('resetLink');

  const STORAGE_KEY = 'kazuri_conversation';
  const GREETING = "Hi! I'm Kazuri — a career coach prototype for Safaricom internship candidates. Ask me anything about applying, or tap 📎 to upload your CV for feedback. If I don't have a confirmed answer, I'll say so instead of guessing.";
  let history = [];

  const UNCERTAIN_MARKERS = ["don't have that confirmed", "not confirmed", "isn't confirmed", "official Safaricom Careers portal", "don't know the exact", "can't confirm"];

  function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function applyInline(text) {
    return text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  }

  function formatMessage(text) {
    const normalized = text.replace(/\n?(#{1,4}\s+)/g, '\n\n$1').trim();
    const escaped = escapeHtml(normalized);
    const blocks = escaped.split(/\n\s*\n/);
    return blocks.map(block => {
      const lines = block.split('\n').map(l => l.trim()).filter(Boolean);
      if (lines.length === 0) return '';
      if (lines[0].startsWith('### ')) {
        const header = applyInline(lines[0].replace(/^###\s+/, ''));
        const rest = lines.slice(1);
        let out = '<h4>' + header + '</h4>';
        if (rest.length) {
          const isList = rest.every(l => l.startsWith('- ') || l.startsWith('* '));
          if (isList) {
            out += '<ul>' + rest.map(l => '<li>' + applyInline(l.replace(/^[-*]\s+/, '')) + '</li>').join('') + '</ul>';
          } else {
            out += '<p>' + rest.map(applyInline).join('<br>') + '</p>';
          }
        }
        return out;
      }
      const isList = lines.every(l => l.startsWith('- ') || l.startsWith('* '));
      if (isList) {
        const items = lines.map(l => '<li>' + applyInline(l.replace(/^[-*]\s+/, '')) + '</li>').join('');
        return '<ul>' + items + '</ul>';
      }
      return '<p>' + lines.map(applyInline).join('<br>') + '</p>';
    }).join('');
  }

  function addMessage(role, text) {
    const msg = document.createElement('div');
    msg.className = 'msg ' + (role === 'user' ? 'user' : 'bot');
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    if (role === 'bot') {
      bubble.innerHTML = formatMessage(text);
    } else {
      bubble.textContent = text;
    }
    msg.appendChild(bubble);
    if (role === 'bot') {
      const isUncertain = UNCERTAIN_MARKERS.some(m => text.toLowerCase().includes(m.toLowerCase()));
      const tag = document.createElement('div');
      tag.className = 'grounded-tag' + (isUncertain ? ' uncertain' : '');
      tag.innerHTML = isUncertain
        ? '⚠ Pointed you to an official source instead of guessing'
        : '✓ Grounded in verified info';
      msg.appendChild(tag);
    }
    chatArea.appendChild(msg);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function addFileChip(filename) {
    const chipMsg = document.createElement('div');
    chipMsg.className = 'msg user';
    chipMsg.innerHTML = '<div class="bubble"><span class="file-chip">📄 ' + escapeHtml(filename) + '</span></div>';
    chatArea.appendChild(chipMsg);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function showTyping() {
    const t = document.createElement('div');
    t.className = 'msg bot';
    t.id = 'typingIndicator';
    t.innerHTML = '<div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
    chatArea.appendChild(t);
    chatArea.scrollTop = chatArea.scrollHeight;
  }
  function hideTyping() {
    const t = document.getElementById('typingIndicator');
    if (t) t.remove();
  }

  function hideQuickRow() { quickRow.classList.add('hidden'); }

  function persist() {
    try { sessionStorage.setItem(STORAGE_KEY, JSON.stringify(history)); } catch (e) {}
  }

  function startFresh() {
    history = [];
    try { sessionStorage.removeItem(STORAGE_KEY); } catch (e) {}
    chatArea.innerHTML = '';
    quickRow.classList.remove('hidden');
    addMessage('bot', GREETING);
    userInput.focus();
  }

  async function sendMessage(text) {
    if (!text.trim()) return;
    hideQuickRow();
    addMessage('user', text);
    history.push({ role: 'user', content: text });
    persist();
    userInput.value = '';
    sendBtn.disabled = true;
    showTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history })
      });
      const data = await res.json();
      hideTyping();
      if (!res.ok) {
        addMessage('bot', data.error || "Sorry, something went wrong. Please try again.");
        sendBtn.disabled = false;
        userInput.focus();
        return;
      }
      const reply = data.reply;
      addMessage('bot', reply);
      history.push({ role: 'assistant', content: reply });
      persist();
    } catch (e) {
      hideTyping();
      addMessage('bot', "Connection issue — please try again in a moment.");
    }
    sendBtn.disabled = false;
    userInput.focus();
  }

  sendBtn.addEventListener('click', () => sendMessage(userInput.value));
  userInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(userInput.value); });
  quickRow.addEventListener('click', (e) => {
    if (e.target.classList.contains('quick-btn')) sendMessage(e.target.dataset.q);
  });
  resetLink.addEventListener('click', startFresh);

  // --- CV upload & review ---
  attachBtn.addEventListener('click', () => fileInput.click());

  async function handleCvFile(file) {
    if (!file) return;
    hideQuickRow();
    addFileChip(file.name);

    attachBtn.disabled = true;
    attachBtn.classList.add('uploading');
    sendBtn.disabled = true;
    showTyping();

    const formData = new FormData();
    formData.append('cv', file);

    try {
      const res = await fetch('/api/review-cv', { method: 'POST', body: formData });
      const data = await res.json();
      hideTyping();
      addMessage('bot', res.ok ? data.reply : (data.error || "Sorry, I couldn't review that file."));
    } catch (e) {
      hideTyping();
      addMessage('bot', "Upload failed — please check your connection and try again.");
    }
    attachBtn.disabled = false;
    attachBtn.classList.remove('uploading');
    sendBtn.disabled = false;
  }

  fileInput.addEventListener('change', () => {
    handleCvFile(fileInput.files[0]);
    fileInput.value = '';
  });

  ['dragover', 'dragenter'].forEach(evt => {
    chatArea.addEventListener(evt, (e) => { e.preventDefault(); chatArea.classList.add('dropzone-active'); });
  });
  ['dragleave', 'drop'].forEach(evt => {
    chatArea.addEventListener(evt, (e) => { e.preventDefault(); chatArea.classList.remove('dropzone-active'); });
  });
  chatArea.addEventListener('drop', (e) => {
    const file = e.dataTransfer.files[0];
    if (file) handleCvFile(file);
  });

  // --- Boot ---
  (function init() {
    let saved = null;
    try { saved = JSON.parse(sessionStorage.getItem(STORAGE_KEY) || 'null'); } catch (e) {}
    if (saved && Array.isArray(saved) && saved.length) {
      history = saved;
      hideQuickRow();
      history.forEach(m => addMessage(m.role === 'user' ? 'user' : 'bot', m.content));
    } else {
      addMessage('bot', GREETING);
    }
    userInput.focus();
  })();
</script>
</body>
</html>
